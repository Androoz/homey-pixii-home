<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960" role="img" aria-labelledby="title desc">
  <title id="title">Tall Pixii Home cabinet proposal</title>
  <desc id="desc">An elongated Pixii battery cabinet with the existing details, proportions and plinth height preserved.</desc>

  <!-- Taller cabinet body; the plinth remains approximately 90–95 px high. -->
  <g transform="translate(960 0) scale(-1 1)">
    <g fill="none" stroke="#fff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
      <path d="M180 90 620 70 780 120v690l-155 55-445-25Z"/>
    </g>

    <g fill="none" stroke="#fff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
      <path d="M620 71v794"/>
      <path d="m185 750 435 20 150-53"/>
    </g>

    <!-- Same narrow grilles, centered as one group in the cabinet above the plinth. -->
    <g fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round">
      <path d="M680 224h42M680 240h42M680 256h42M680 272h42M680 288h42M680 304h42M680 320h42M680 336h42"/>
      <path d="M680 500h42M680 516h42M680 532h42M680 548h42M680 564h42M680 580h42M680 596h42M680 612h42"/>
    </g>
  </g>

  <!-- Existing Pixii battery symbol, centered in the cabinet above the plinth. -->
  <g fill="none" stroke="#fff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <path d="M490 350h-30q-20 0-20 20v100q0 20 20 20h30"/>
    <path d="M590 350h30q20 0 20 20v100q0 20-20 20h-30"/>
    <path d="m560 340-65 80h55l-30 80 90-100h-50Z"/>
    <path d="M680 412v20"/>
  </g>
</svg>
