<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960" role="img" aria-labelledby="title desc">
  <title id="title">Pixii Home cabinet with mirrored perspective</title>
  <desc id="desc">A tall Pixii battery cabinet with a broad front, narrow left side, plinth, battery symbol and two ventilation grilles.</desc>

  <!-- Exact mirrored version of v7; line hierarchy remains 40 / 20 / 10 px. -->
